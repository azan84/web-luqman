<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dungeon Crawler</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #111;
        color: #eee;
        font-family: 'Courier New', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100dvh;
        overflow: hidden;
      }

      /* ── Top HUD ── */
      #hud {
        width: 100%;
        max-width: 640px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 10px;
        background: #1a1a1a;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
      }
      #hud .bar-wrap { flex: 1; }
      #hud label { font-size: 11px; color: #888; }
      .bar { height: 10px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 2px; }
      .bar-fill { height: 100%; border-radius: 3px; transition: width 0.15s; }
      #hp-fill   { background: #c0392b; }
      #xp-fill   { background: #2980b9; }
      #hud .stats { font-size: 12px; white-space: nowrap; }
      #hud .stats span { color: #f0a500; }

      /* ── Canvas wrapper ── */
      #canvas-wrap {
        position: relative;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      canvas { display: block; image-rendering: pixelated; }

      /* ── Combat log ── */
      #log {
        width: 100%;
        max-width: 640px;
        background: #1a1a1a;
        border-top: 1px solid #333;
        padding: 4px 10px;
        font-size: 12px;
        flex-shrink: 0;
        min-height: 72px;
      }
      #log p { color: #aaa; line-height: 1.4; }
      #log p.new { color: #eee; }

      /* ── Mobile d-pad ── */
      #dpad {
        display: none;
        position: absolute;
        bottom: 12px;
        right: 12px;
        gap: 4px;
      }
      .dpad-btn {
        width: 44px; height: 44px;
        background: rgba(255,255,255,0.12);
        border: 1px solid #555;
        border-radius: 6px;
        font-size: 18px;
        color: #fff;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        user-select: none;
      }
      @media (pointer: coarse) {
        #dpad { display: grid; grid-template-columns: 44px 44px 44px; }
        .dpad-spacer { width: 44px; height: 44px; }
      }

      /* ── Game-over modal ── */
      #gameover {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.78);
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        text-align: center;
      }
      #gameover.show { display: flex; }
      #gameover h1 { font-size: 2.4rem; color: #c0392b; }
      #gameover p  { font-size: 1rem; color: #ccc; }
      #gameover button {
        margin-top: 8px;
        padding: 10px 28px;
        background: #c0392b;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
        font-family: inherit;
      }
      #gameover button:hover { background: #e74c3c; }
    </style>
    <script type="module" crossorigin src="./assets/index-D3yyvDym.js"></script>
  </head>
  <body>
    <!-- HUD -->
    <div id="hud">
      <div class="bar-wrap">
        <label>HP</label>
        <div class="bar"><div class="bar-fill" id="hp-fill" style="width:100%"></div></div>
      </div>
      <div class="bar-wrap">
        <label>XP</label>
        <div class="bar"><div class="bar-fill" id="xp-fill" style="width:0%"></div></div>
      </div>
      <div class="stats">
        Floor <span id="stat-floor">1</span> &nbsp;
        Lv <span id="stat-level">1</span> &nbsp;
        ATK <span id="stat-atk">3</span> &nbsp;
        DEF <span id="stat-def">1</span> &nbsp;
        &#x1F3F9; <span id="stat-arrows">—</span>
      </div>
    </div>

    <!-- Canvas -->
    <div id="canvas-wrap">
      <canvas id="game-canvas"></canvas>

      <!-- D-pad (touch only) -->
      <div id="dpad">
        <div class="dpad-spacer"></div>
        <button class="dpad-btn" data-dir="up">▲</button>
        <div class="dpad-spacer"></div>
        <button class="dpad-btn" data-dir="left">◀</button>
        <div class="dpad-spacer"></div>
        <button class="dpad-btn" data-dir="right">▶</button>
        <div class="dpad-spacer"></div>
        <button class="dpad-btn" data-dir="down">▼</button>
        <div class="dpad-spacer"></div>
      </div>

      <!-- Game-over overlay -->
      <div id="gameover">
        <h1>YOU DIED</h1>
        <p id="gameover-stats"></p>
        <button id="restart-btn">Play Again</button>
      </div>
    </div>

    <!-- Log -->
    <div id="log"></div>

  </body>
</html>
